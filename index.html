<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Comparator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    input[type="month"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    .app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    h1 { font-size: 24px; font-weight: 700; }
    h2 { font-size: 15px; font-weight: 700; }
    .subtitle { font-size: 14px; color: #888; margin-top: 4px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; }
    .header-actions { display: flex; gap: 8px; }
    .btn { font-size: 13px; padding: 7px 14px; border-radius: 7px; cursor: pointer; font-weight: 600; font-family: inherit; }
    .btn-outline { border: 1px solid #e0e0e0; background: #fff; color: #555; }
    .btn-primary { border: 1px solid #2563eb; background: #2563eb; color: #fff; }
    .btn-sm { font-size: 13px; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-weight: 600; font-family: inherit; border: 1px solid #e0e0e0; background: #fff; color: #444; }
    .label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .input { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 7px; font-size: 14px; outline: none; background: #fafafa; color: #1a1a1a; font-family: inherit; }
    .input:focus { border-color: #aaa; }
    .input-prefix { position: relative; }
    .input-prefix .pfx { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; pointer-events: none; }
    .input-prefix .input { padding-left: 30px; }
    .globals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 36px; }
    .strategies-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .strategies { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
    .strategy-card { border: 1px solid #ebebeb; border-radius: 10px; padding: 14px 16px; background: #fff; position: relative; }
    .strategy-grid { display: grid; grid-template-columns: 28px 2fr 1.6fr 1fr 1fr; gap: 12px; padding-right: 32px; align-items: end; }
    .remove-btn { position: absolute; top: 14px; right: 14px; font-size: 12px; color: #ccc; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
    .remove-btn:hover { color: #999; }
    .chart-section h2 { margin-bottom: 16px; }
    .summary-cards { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .summary-card { flex: 1; min-width: 160px; border-radius: 8px; padding: 12px 14px; }
    .summary-card .card-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 20px; font-weight: 700; }
    .summary-card .card-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #dc2626; margin-bottom: 20px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #e0e0e0; cursor: pointer; flex-shrink: 0; display: block; }
    .color-picker-popup { position: fixed; z-index: 1000; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.13); width: 180px; }
    .color-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-bottom: 8px; }
    .color-dot { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
    .color-custom { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #999; }
    svg text { font-family: 'DM Sans', system-ui, sans-serif; }
    @media (max-width: 600px) {
      .globals { grid-template-columns: 1fr 1fr; }
      .strategy-grid { grid-template-columns: 28px 1fr 1fr; grid-template-rows: auto auto; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.23.1';
import { useState, useMemo, useRef, useEffect, useCallback } from 'https://esm.sh/preact@10.23.1/hooks';

const PRESET_COLORS = [
  "#2563eb","#dc2626","#16a34a","#d97706","#7c3aed","#0891b2",
  "#db2777","#ea580c","#65a30d","#0d9488","#4f46e5","#b45309",
];
const DEFAULT_COLORS = PRESET_COLORS;

const mToY = m => (Math.pow(1 + m / 100, 12) - 1) * 100;
const yToM = y => (Math.pow(1 + y / 100, 1 / 12) - 1) * 100;
const fmtCurrency = v => new Intl.NumberFormat("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 }).format(v);
const fmtK = v => v >= 1e6 ? `${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `${(v/1e3).toFixed(0)}k` : String(Math.round(v));
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };

let uid = 10;

const INITIAL_STRATEGIES = [
  { id:1, name:"Poupança",       expirationDate:"2035-12", monthlyYield:"0.50", yearlyYield:mToY(0.5).toFixed(2), color:DEFAULT_COLORS[0] },
  { id:2, name:"Tesouro Direto", expirationDate:"2035-12", monthlyYield:"1.00", yearlyYield:mToY(1.0).toFixed(2), color:DEFAULT_COLORS[1] },
];

// ── Color Picker ──────────────────────────────────────────────────────────────
function ColorPicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [rect, setRect] = useState(null);
  const ref = useRef();

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const toggle = () => {
    if (!open && ref.current) setRect(ref.current.getBoundingClientRect());
    setOpen(o => !o);
  };

  return h('div', { style: { position:'relative' }, ref },
    h('button', {
      onClick: toggle, title: "Pick color",
      style: { width:28, height:28, borderRadius:6, border:'2px solid #e0e0e0', background:value, cursor:'pointer', display:'block', padding:0 }
    }),
    open && h('div', {
      class: 'color-picker-popup',
      style: { top: rect ? rect.bottom + 6 : 0, left: rect ? Math.min(rect.left, window.innerWidth - 200) : 0 }
    },
      h('div', { class: 'color-grid' },
        PRESET_COLORS.map(c => h('button', {
          key: c, onClick: () => { onChange(c); setOpen(false); },
          style: { width:20, height:20, borderRadius:4, border: value===c ? '2px solid #333' : '2px solid transparent', background:c, cursor:'pointer', padding:0 }
        }))
      ),
      h('div', { class: 'color-custom' },
        h('input', { type:'color', value, onInput: e => onChange(e.target.value),
          style: { width:28, height:28, border:'none', padding:0, borderRadius:4, cursor:'pointer', background:'none' } }),
        'Custom'
      )
    )
  );
}

// ── SVG Line Chart ────────────────────────────────────────────────────────────
function LineChart({ data, strategies, width, height }) {
  const [tooltip, setTooltip] = useState(null);
  const svgRef = useRef();
  const pad = { top: 10, right: 20, bottom: 40, left: 64 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;

  const allVals = data.flatMap(row => strategies.map(s => row[s.id]).filter(v => v != null && !isNaN(v)));
  if (!allVals.length) return null;
  const minV = 0, maxV = Math.max(...allVals) * 1.05;

  const xScale = i => (i / (data.length - 1)) * W;
  const yScale = v => H - ((v - minV) / (maxV - minV)) * H;

  // x-axis ticks: yearly
  const xTicks = data.reduce((acc, row, i) => {
    if (i === 0 || row.label.endsWith('/01')) acc.push(i);
    return acc;
  }, []);

  // y-axis ticks
  const yTickCount = 5;
  const yTicks = Array.from({ length: yTickCount }, (_, i) => minV + (maxV - minV) * i / (yTickCount - 1));

  const pathForStrategy = s => {
    let d = '';
    data.forEach((row, i) => {
      const v = row[s.id];
      if (v == null || isNaN(v)) return;
      const x = xScale(i), y = yScale(v);
      d += d === '' ? `M${x},${y}` : `L${x},${y}`;
    });
    return d;
  };

  const handleMouseMove = e => {
    if (!svgRef.current) return;
    const svgRect = svgRef.current.getBoundingClientRect();
    const mx = e.clientX - svgRect.left - pad.left;
    const idx = Math.round((mx / W) * (data.length - 1));
    if (idx < 0 || idx >= data.length) { setTooltip(null); return; }
    const row = data[idx];
    const entries = strategies.map(s => ({ s, v: row[s.id] })).filter(x => x.v != null);
    if (!entries.length) { setTooltip(null); return; }
    setTooltip({ idx, label: row.label, entries, x: xScale(idx) + pad.left, y: pad.top + 10 });
  };

  return h('div', { style: { position:'relative' } },
    h('svg', {
      ref: svgRef,
      width, height,
      onMouseMove: handleMouseMove,
      onMouseLeave: () => setTooltip(null),
      style: { display:'block', overflow:'visible' }
    },
      h('g', { transform: `translate(${pad.left},${pad.top})` },
        // grid lines
        yTicks.map((v, i) => h('line', { key:i, x1:0, x2:W, y1:yScale(v), y2:yScale(v), stroke:'#f0f0f0', strokeWidth:1 })),
        // y-axis labels
        yTicks.map((v, i) => h('text', { key:i, x:-8, y:yScale(v)+4, textAnchor:'end', fontSize:11, fill:'#aaa' }, fmtK(v))),
        // x-axis ticks
        xTicks.map(i => {
          const label = data[i].label.slice(0,4);
          return h('g', { key:i },
            h('text', { x:xScale(i), y:H+20, textAnchor:'middle', fontSize:11, fill:'#aaa' }, label)
          );
        }),
        // lines
        strategies.map(s => h('path', {
          key: s.id,
          d: pathForStrategy(s),
          fill: 'none',
          stroke: s.color,
          strokeWidth: 2.5,
          strokeLinejoin: 'round',
          strokeLinecap: 'round'
        })),
        // tooltip vertical line
        tooltip && h('line', { x1:tooltip.x - pad.left, x2:tooltip.x - pad.left, y1:0, y2:H, stroke:'#ccc', strokeWidth:1, strokeDasharray:'4 3' })
      )
    ),
    // Tooltip div overlay
    tooltip && h('div', {
      style: {
        position:'absolute',
        left: Math.min(tooltip.x + 10, width - 180),
        top: 10,
        background:'#fff', border:'1px solid #e5e5e5', borderRadius:8,
        padding:'10px 14px', fontSize:13, boxShadow:'0 4px 12px rgba(0,0,0,0.08)',
        pointerEvents:'none', minWidth:150
      }
    },
      h('div', { style:{ fontWeight:600, marginBottom:6, color:'#444' } }, tooltip.label),
      tooltip.entries.map(({ s, v }) =>
        h('div', { key:s.id, style:{ color:s.color, marginBottom:2 } },
          `${s.name}: `, h('b', null, `R$ ${fmtCurrency(v)}`)
        )
      )
    ),
    // Legend
    h('div', { style:{ display:'flex', gap:16, flexWrap:'wrap', marginTop:8, paddingLeft: pad.left } },
      strategies.map(s => h('div', { key:s.id, style:{ display:'flex', alignItems:'center', gap:6, fontSize:13, color:'#555' } },
        h('span', { style:{ width:18, height:3, borderRadius:2, background:s.color, display:'inline-block', flexShrink:0 } }),
        s.name
      ))
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [initial,     setInitial]     = useState("10000");
  const [monthly,     setMonthly]     = useState("500");
  const [startDate,   setStartDate]   = useState(todayStr());
  const [strategies,  setStrategies]  = useState(INITIAL_STRATEGIES);
  const [importError, setImportError] = useState("");
  const [chartWidth,  setChartWidth]  = useState(800);
  const chartRef = useRef();
  const fileRef  = useRef();

  useEffect(() => {
    const obs = new ResizeObserver(entries => {
      for (const e of entries) setChartWidth(e.contentRect.width);
    });
    if (chartRef.current) obs.observe(chartRef.current);
    return () => obs.disconnect();
  }, []);

  const update = (id, field, val) => setStrategies(prev => prev.map(s => {
    if (s.id !== id) return s;
    const u = { ...s, [field]: val };
    if (field === "monthlyYield") { const m = parseFloat(val); u.yearlyYield = isNaN(m) ? "" : mToY(m).toFixed(2); }
    if (field === "yearlyYield")  { const y = parseFloat(val); u.monthlyYield = isNaN(y) ? "" : yToM(y).toFixed(4); }
    return u;
  }));

  const addStrategy = () => {
    const used = strategies.map(s => s.color);
    const color = DEFAULT_COLORS.find(c => !used.includes(c)) || DEFAULT_COLORS[strategies.length % DEFAULT_COLORS.length];
    setStrategies(prev => [...prev, {
      id: uid++, name: `Strategy ${prev.length+1}`,
      expirationDate: "2035-12", monthlyYield: "0.80",
      yearlyYield: mToY(0.8).toFixed(2), color
    }]);
  };

  const removeStrategy = id => setStrategies(prev => prev.filter(s => s.id !== id));

  const handleExport = () => {
    const blob = new Blob([JSON.stringify({ initial, monthly, startDate, strategies, exportedAt: new Date().toISOString() }, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `investment-comparison-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = e => {
    setImportError("");
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data.strategies)) throw new Error();
        setInitial(data.initial ?? "0");
        setMonthly(data.monthly ?? "0");
        setStartDate(data.startDate ?? todayStr());
        setStrategies(data.strategies.map((s,i) => ({ ...s, id:uid++, color: s.color || DEFAULT_COLORS[i % DEFAULT_COLORS.length] })));
      } catch { setImportError("Invalid file. Please import a valid comparison JSON."); }
    };
    reader.readAsText(file); e.target.value = "";
  };

  const { chartData, finalValues } = useMemo(() => {
    const init = parseFloat(initial) || 0, mon = parseFloat(monthly) || 0;
    const [sy, sm0] = startDate.split("-").map(Number);
    const startYear = sy, startMonth = sm0 - 1;
    const parseExpiry = str => { if (!str) return null; const [y,m] = str.split("-").map(Number); return new Date(y, m-1, 1); };
    const expiries = strategies.map(s => parseExpiry(s.expirationDate)).filter(Boolean);
    if (!expiries.length) return { chartData:[], finalValues:{} };
    const maxDate = new Date(Math.max(...expiries));
    const totalMonths = (maxDate.getFullYear()-startYear)*12 + (maxDate.getMonth()-startMonth);
    if (totalMonths <= 0) return { chartData:[], finalValues:{} };
    const rows = [], fv = {};
    for (let i = 0; i <= totalMonths; i++) {
      const d = new Date(startYear, startMonth+i, 1);
      const row = { label:`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}`, month:i };
      strategies.forEach(s => {
        const exp = parseExpiry(s.expirationDate); if (!exp) return;
        const expM = (exp.getFullYear()-startYear)*12+(exp.getMonth()-startMonth);
        if (i > expM) { row[s.id] = null; return; }
        const r = parseFloat(s.monthlyYield)/100; if (isNaN(r)) { row[s.id]=0; return; }
        const val = r === 0 ? init+mon*i : init*Math.pow(1+r,i)+mon*(Math.pow(1+r,i)-1)/r;
        row[s.id] = Math.round(val*100)/100;
        if (i===expM || i===totalMonths) fv[s.id] = row[s.id];
      });
      rows.push(row);
    }
    strategies.forEach(s => { if (fv[s.id]===undefined) { const last=[...rows].reverse().find(r=>r[s.id]!=null); if(last) fv[s.id]=last[s.id]; }});
    return { chartData:rows, finalValues:fv };
  }, [initial, monthly, startDate, strategies]);

  return h('div', { class:'app' },

    // Header
    h('div', { class:'header' },
      h('div', null,
        h('h1', null, 'Investment Comparator'),
        h('p', { class:'subtitle' }, 'Compare how different strategies grow your portfolio.')
      ),
      h('div', { class:'header-actions' },
        h('input', { ref:fileRef, type:'file', accept:'.json', onChange:handleImport, style:{display:'none'} }),
        h('button', { class:'btn btn-outline', onClick:() => fileRef.current.click() }, '↑ Import'),
        h('button', { class:'btn btn-primary', onClick:handleExport }, '↓ Export'),
      )
    ),

    importError && h('div', { class:'error-box' }, importError),

    // Global inputs
    h('div', { class:'globals' },
      ['Initial Amount','Monthly Addition'].map((label, idx) => {
        const val = idx === 0 ? initial : monthly;
        const set = idx === 0 ? setInitial : setMonthly;
        return h('div', { key:label },
          h('label', { class:'label' }, label),
          h('div', { class:'input-prefix' },
            h('span', { class:'pfx' }, 'R$'),
            h('input', { class:'input', type:'number', value:val, onInput:e=>set(e.target.value), min:'0' })
          )
        );
      }),
      h('div', null,
        h('label', { class:'label' }, 'Start Date'),
        h('input', { class:'input', type:'month', value:startDate, onInput:e=>setStartDate(e.target.value) })
      )
    ),

    // Strategies
    h('div', null,
      h('div', { class:'strategies-header' },
        h('h2', null, 'Strategies'),
        h('button', { class:'btn-sm', onClick:addStrategy }, '+ Add')
      ),
      h('div', { class:'strategies' },
        strategies.map(s => h('div', {
          key: s.id, class:'strategy-card',
          style: { borderLeft:`3px solid ${s.color}` }
        },
          strategies.length > 1 && h('button', { class:'remove-btn', onClick:()=>removeStrategy(s.id) }, '✕'),
          h('div', { class:'strategy-grid' },
            h('div', { style:{paddingBottom:2} }, h(ColorPicker, { value:s.color, onChange:v=>update(s.id,'color',v) })),
            h('div', null,
              h('label', { class:'label' }, 'Name'),
              h('input', { class:'input', value:s.name, onInput:e=>update(s.id,'name',e.target.value) })
            ),
            h('div', null,
              h('label', { class:'label' }, 'Expiration'),
              h('input', { class:'input', type:'month', value:s.expirationDate, min:todayStr(), onInput:e=>update(s.id,'expirationDate',e.target.value) })
            ),
            h('div', null,
              h('label', { class:'label' }, 'Monthly %'),
              h('input', { class:'input', type:'number', step:'0.01', min:'0', value:s.monthlyYield, onInput:e=>update(s.id,'monthlyYield',e.target.value) })
            ),
            h('div', null,
              h('label', { class:'label' }, 'Yearly %'),
              h('input', { class:'input', type:'number', step:'0.01', min:'0', value:s.yearlyYield, onInput:e=>update(s.id,'yearlyYield',e.target.value) })
            ),
          )
        ))
      )
    ),

    // Chart
    chartData.length > 0 && h('div', { class:'chart-section' },
      h('h2', null, 'Portfolio Evolution'),
      h('div', { ref:chartRef },
        chartWidth > 0 && h(LineChart, { data:chartData, strategies, width:chartWidth, height:300 })
      ),
      h('div', { class:'summary-cards' },
        strategies.map(s => h('div', {
          key: s.id, class:'summary-card',
          style: {
            border:`1px solid ${s.color}33`,
            borderLeft:`3px solid ${s.color}`,
            background:`${s.color}08`
          }
        },
          h('div', { class:'card-label' }, s.name),
          h('div', { class:'card-value', style:{color:s.color} }, `R$ ${fmtCurrency(finalValues[s.id]||0)}`),
          h('div', { class:'card-sub' }, 'at expiration')
        ))
      )
    )
  );
}

render(h(App, null), document.getElementById('root'));
</script>
</body>
</html>
